version: 2
project_name: gemini
env:
  - GOBIN={{ .Env.TMPDIR }}/go-bin
release:
  disable: "true"
  prerelease: auto
  footer: |
    You can verify the signature of the checksums.txt file using [cosign](https://github.com/sigstore/cosign).

    ```
    cosign verify-blob checksums.txt --signature=checksums.txt.sig  --key https://artifacts.fairwinds.com/cosign.pub
    ```
brews:
  - name: gemini
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: Brew formula update for {{ .ProjectName }} version {{ .Tag }}
    test: |
      system "#{bin}/gemini version"
    description: Open Source Best Practices for Kubernetes
    skip_upload: "true"
    goarm: "6"
    goamd64: v1
builds:
  - id: gemini
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm
      - arm64
    goamd64:
      - v1
    go386:
      - sse2
    goarm:
      - "6"
      - "7"
    goarm64:
      - v8.0
    gomips:
      - hardfloat
    goppc64:
      - power8
    goriscv64:
      - rva20u64
    targets:
      - linux_amd64_v1
      - linux_arm_6
      - linux_arm_7
      - linux_arm64_v8.0
      - darwin_amd64_v1
      - darwin_arm64_v8.0
      - windows_amd64_v1
      - windows_arm_6
      - windows_arm_7
      - windows_arm64_v8.0
    dir: .
    main: .
    binary: gemini
    builder: go
    tool: go
    command: build
    ldflags:
      - -X main.Version={{.Version}} -X main.Commit={{.Commit}} -s -w
    env:
      - CGO_ENABLED=0
      - GO111MODULE=on
archives:
  - id: gemini
    ids:
      - gemini
    builds_info:
      mode: 493
    name_template: '{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}{{ if .Mips }}_{{ .Mips }}{{ end }}'
    formats:
      - tar.gz
    files:
      - src: license*
      - src: LICENSE*
      - src: readme*
      - src: README*
      - src: changelog*
      - src: CHANGELOG*
    builds:
      - gemini
snapshot:
  version_template: '{{ .Version }}-SNAPSHOT-{{ .ShortCommit }}'
checksum:
  name_template: checksums.txt
  algorithm: sha256
dockers:
  - goos: linux
    goarch: amd64
    goarm: "6"
    goamd64: v1
    dockerfile: Dockerfile
    image_templates:
      - quay.io/fairwinds/gemini:{{ .FullCommit }}-amd64
    build_flag_templates:
      - --platform=linux/amd64
    use: buildx
  - goos: linux
    goarch: arm64
    goarm: "6"
    goamd64: v1
    dockerfile: Dockerfile
    image_templates:
      - quay.io/fairwinds/gemini:{{ .FullCommit }}-arm64
    build_flag_templates:
      - --platform=linux/arm64
    use: buildx
docker_manifests:
  - name_template: quay.io/fairwinds/gemini:{{ .FullCommit }}
    image_templates:
      - quay.io/fairwinds/gemini:{{ .FullCommit }}-amd64
      - quay.io/fairwinds/gemini:{{ .FullCommit }}-arm64
    use: docker
  - name_template: quay.io/fairwinds/gemini:{{ .Env.feature_docker_tag }}
    skip_push: "false"
    image_templates:
      - quay.io/fairwinds/gemini:{{ .FullCommit }}-amd64
      - quay.io/fairwinds/gemini:{{ .FullCommit }}-arm64
    use: docker
  - name_template: quay.io/fairwinds/gemini:latest
    skip_push: "true"
    image_templates:
      - quay.io/fairwinds/gemini:{{ .FullCommit }}-amd64
      - quay.io/fairwinds/gemini:{{ .FullCommit }}-arm64
    use: docker
  - name_template: quay.io/fairwinds/gemini:{{ .Tag }}
    skip_push: "true"
    image_templates:
      - quay.io/fairwinds/gemini:{{ .FullCommit }}-amd64
      - quay.io/fairwinds/gemini:{{ .FullCommit }}-arm64
    use: docker
  - name_template: quay.io/fairwinds/gemini:{{ .Major }}
    skip_push: "true"
    image_templates:
      - quay.io/fairwinds/gemini:{{ .FullCommit }}-amd64
      - quay.io/fairwinds/gemini:{{ .FullCommit }}-arm64
    use: docker
  - name_template: quay.io/fairwinds/gemini:{{ .Major }}.{{ .Minor }}
    skip_push: "true"
    image_templates:
      - quay.io/fairwinds/gemini:{{ .FullCommit }}-amd64
      - quay.io/fairwinds/gemini:{{ .FullCommit }}-arm64
    use: docker
changelog:
  filters:
    exclude:
      - '^docs:'
      - '^test:'
  sort: asc
  format: '{{ .SHA }} {{ .Message }}'
dist: dist
signs:
  - id: default
    cmd: cosign
    args:
      - sign-blob
      - --key=hashivault://cosign
      - -output-signature=${signature}
      - ${artifact}
    signature: ${artifact}.sig
    artifacts: checksum
env_files:
  github_token: ~/.config/goreleaser/github_token
  gitlab_token: ~/.config/goreleaser/gitlab_token
  gitea_token: ~/.config/goreleaser/gitea_token
before:
  hooks:
    - go mod download
source:
  name_template: '{{ .ProjectName }}-{{ .Version }}'
  format: tar.gz
gomod:
  gobinary: go
announce:
  twitter:
    message_template: '{{ .ProjectName }} {{ .Tag }} is out! Check it out at {{ .ReleaseURL }}'
  mastodon:
    message_template: '{{ .ProjectName }} {{ .Tag }} is out! Check it out at {{ .ReleaseURL }}'
    server: ""
  reddit:
    title_template: '{{ .ProjectName }} {{ .Tag }} is out!'
    url_template: '{{ .ReleaseURL }}'
  slack:
    message_template: '{{ .ProjectName }} {{ .Tag }} is out! Check it out at {{ .ReleaseURL }}'
    username: GoReleaser
  discord:
    message_template: '{{ .ProjectName }} {{ .Tag }} is out! Check it out at {{ .ReleaseURL }}'
    author: GoReleaser
    color: "3888754"
    icon_url: https://goreleaser.com/static/avatar.png
  teams:
    title_template: '{{ .ProjectName }} {{ .Tag }} is out!'
    message_template: '{{ .ProjectName }} {{ .Tag }} is out! Check it out at {{ .ReleaseURL }}'
    color: '#2D313E'
    icon_url: https://goreleaser.com/static/avatar.png
  smtp:
    subject_template: '{{ .ProjectName }} {{ .Tag }} is out!'
    body_template: 'You can view details from: {{ .ReleaseURL }}'
  mattermost:
    message_template: '{{ .ProjectName }} {{ .Tag }} is out! Check it out at {{ .ReleaseURL }}'
    title_template: '{{ .ProjectName }} {{ .Tag }} is out!'
    username: GoReleaser
  linkedin:
    message_template: '{{ .ProjectName }} {{ .Tag }} is out! Check it out at {{ .ReleaseURL }}'
  telegram:
    message_template: '{{ mdv2escape .ProjectName }} {{ mdv2escape .Tag }} is out{{ mdv2escape "!" }} Check it out at {{ mdv2escape .ReleaseURL }}'
    parse_mode: MarkdownV2
  webhook:
    message_template: '{ "message": "{{ .ProjectName }} {{ .Tag }} is out! Check it out at {{ .ReleaseURL }}"}'
    content_type: application/json; charset=utf-8
    expected_status_codes:
      - 200
      - 201
      - 202
      - 204
  opencollective:
    title_template: '{{ .Tag }}'
    message_template: '{{ .ProjectName }} {{ .Tag }} is out!<br/>Check it out at <a href="{{ .ReleaseURL }}">{{ .ReleaseURL }}</a>'
  bluesky:
    message_template: '{{ .ProjectName }} {{ .Tag }} is out! Check it out at {{ .ReleaseURL }}'
git:
  tag_sort: -version:refname
github_urls:
  download: https://github.com
gitlab_urls:
  download: https://gitlab.com
